<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'en' }}" data-theme="auto">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title | escape }} | {% endif %}{{ site.title | escape }}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <link rel="stylesheet" href="{{ '/assets/css/custom.css' | relative_url }}">
</head>
<body>

  <!-- Mobile Header -->
  <div class="mobile-header">
    <button class="burger" id="burger" aria-label="Toggle navigation">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <strong>{{ site.title }}</strong>
  </div>

  <!-- Overlay -->
  <div class="sidebar-overlay" id="sidebar-overlay" role="button" aria-label="Close navigation"></div>

  <!-- Sidebar -->
  {% include sidebar.html %}

  <!-- Main Content -->
  <div class="main-content">
    <main>
      {{ content }}
    </main>

    <footer>
      <hr>
      <small>{{ site.title }} &middot; {{ site.description }}</small>
    </footer>
  </div>

  <script src="{{ '/assets/js/sidebar.js' | relative_url }}"></script>

  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';

    // Convert kramdown mermaid code blocks to mermaid divs
    document.querySelectorAll('pre > code.language-mermaid').forEach(function (codeBlock) {
      var pre = codeBlock.parentElement;
      var div = document.createElement('div');
      div.className = 'mermaid';
      div.textContent = codeBlock.textContent;
      pre.replaceWith(div);
    });

    // Pick mermaid theme based on OS preference
    var isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

    mermaid.initialize({
      startOnLoad: false,
      theme: isDark ? 'dark' : 'forest',
      securityLevel: 'loose'
    });
    mermaid.run();
  </script>
</body>
</html>
