name: KF Unified Sync

on:
  push:
    branches: [master]
  repository_dispatch:
    types: [kanban-updated]
  schedule:
    - cron: '0 4 * * 1'    # Luni 04:00 UTC — refresh săptămânal
  workflow_dispatch:

env:
  KF_ORG: katty-fashion

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.KF_PAT }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install pyyaml requests google-auth google-api-python-client

      - name: Discover repos with kanban.md
        run: python scripts/discover.py
        env:
          KF_PAT: ${{ secrets.KF_PAT }}

      - name: Clone discovered repos
        run: |
          mkdir -p repos
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            repo="${line%%:*}"
            branch="${line#*:}"
            [ "$branch" = "$repo" ] && branch="master"
            echo "Cloning $repo (branch: $branch)..."
            git clone --depth=1 -b "$branch" \
              https://${{ secrets.KF_PAT }}@github.com/${{ env.KF_ORG }}/${repo}.git \
              repos/${repo} || echo "Warning: Failed to clone ${repo}"
          done < repos/discovered.txt

      - name: Aggregate Kanbans + Calendar
        run: python scripts/aggregator.py

      - name: Sync LOE to Google Sheets
        continue-on-error: true
        run: python scripts/sheets_sync.py
        env:
          GSHEET_ID: ${{ secrets.GSHEET_ID }}
          GSHEET_CLIENT_EMAIL: ${{ secrets.GSHEET_CLIENT_EMAIL }}
          GSHEET_PRIVATE_KEY: ${{ secrets.GSHEET_PRIVATE_KEY }}

      - name: Commit unified docs
        run: |
          git config user.name "KF Bot"
          git config user.email "bot@katty-fashion.dev"
          git add docs/ || true
          git diff --staged --quiet || \
            git commit -m "chore: auto-update unified docs [skip ci]"
          git push

      - name: Deploy GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages

      - name: Build summary
        id: summary
        run: |
          PROJ_COUNT=$(wc -l < repos/discovered.txt | tr -d ' ')
          TASK_COUNT=$(grep -c '|' docs/_projects/*.md 2>/dev/null | tail -1 | cut -d: -f2 || echo 0)
          TRIGGER="${{ github.event.client_payload.project || github.event_name }}"
          echo "text=🚀 *KF Dashboard Updated*\nProjects: ${PROJ_COUNT} | Trigger: ${TRIGGER}\nKanban + Calendar refreshed\nLOE synced to Google Sheets\n🔗 https://katty-fashion.github.io/kf-cpto/" >> "$GITHUB_OUTPUT"

      - name: Notify Google Chat
        run: |
          curl -s -X POST "${{ secrets.GOOGLE_CHAT_WEBHOOK }}" \
          -H 'Content-Type: application/json' \
          -d "{\"text\": \"${{ steps.summary.outputs.text }}\"}"
