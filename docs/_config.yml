# KF Team — GitHub Pages Configuration
# Jekyll config for Git-Native Project Management Dashboard

title: KF Team Dashboard
description: Single Pane of Glass · GitHub Native · Google Workspace Integration
baseurl: "/kf-cpto"
url: "https://kf-team.github.io"

# Project repositories to aggregate
kf_projects:
- project-template

# Build settings
markdown: kramdown

# Plugins (only GitHub Pages supported plugins)
plugins:
- jekyll-feed
- jekyll-seo-tag

# Collections
collections:
  projects:
    output: true
    permalink: /projects/:name/

# Defaults
defaults:
- scope:
    path: ""
    type: "pages"
  values:
    layout: "default"
- scope:
    path: "projects"
  values:
    layout: "default"

# Exclude from build
exclude:
- scripts/
- repos/
- "*.py"
- Gemfile
- Gemfile.lock
- README.md
- kf-cpto.md
